spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://postgres:5432/his_bi
    username: his_user
    password: his_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    stream:
      function:
      # Use multi-function approach if needed, but for now fixed
        definition: eligibilityDetermined
      bindings:
        eligibilityDetermined-in-0:
          destination: eligibility-determined-topic
          group: bi-group
      kafka:
        binder:
          brokers: kafka:29092
