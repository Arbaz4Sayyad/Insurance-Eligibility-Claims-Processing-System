spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/his_ed
    username: his_user
    password: his_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    stream:
      function:
        definition: dataCaptured;eligibilityDetermined
      bindings:
        dataCaptured-in-0:
          destination: data-captured-topic
          group: ed-group
        eligibilityDetermined-out-0:
          destination: eligibility-determined-topic
      kafka:
        binder:
          brokers: kafka:29092

# Custom ED configuration - routes through API Gateway inside the cluster
ed:
  client:
    ar:
      url: http://api-gateway:8080
    dc:
      url: http://api-gateway:8080
