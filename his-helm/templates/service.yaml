{{- range $serviceName, $serviceConfig := .Values.services }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  labels:
    app: {{ $serviceName }}
spec:
  type: ClusterIP
  ports:
    - port: {{ if eq $serviceName "config-server" }}8888{{ else if eq $serviceName "eureka-server" }}8761{{ else }}8080{{ end }}
      targetPort: {{ $serviceConfig.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ $serviceName }}
---
{{- end }}
